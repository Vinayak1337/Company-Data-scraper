{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        var theme = localStorage.getItem('theme');
        if (theme === 'dark') document.documentElement.classList.add('dark');
      })();
    </script>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Job Scout — Premium Careers Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
    <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
    <script>
      document.addEventListener("htmx:configRequest", function (event) {
        const token = document.cookie.split("; ").find((row) => row.startsWith("csrftoken="));
        if (token) {
          event.detail.headers["X-CSRFToken"] = decodeURIComponent(token.split("=")[1]);
        }
      });

      // Toast system — listens for HX-Trigger: {"toast": {"type":"success","msg":"..."}}
      (function () {
        function showToast(detail) {
          if (!detail || !detail.msg) return;
          var root = document.getElementById("toast-root");
          if (!root) {
            root = document.createElement("div");
            root.id = "toast-root";
            document.body.appendChild(root);
          }
          var el = document.createElement("div");
          el.className = "toast toast-" + (detail.type || "success");
          el.innerHTML = '<span class="toast-dot"></span><span class="toast-msg"></span>';
          el.querySelector(".toast-msg").textContent = detail.msg;
          root.appendChild(el);
          setTimeout(function () {
            el.style.transition = "opacity 240ms ease, transform 240ms ease";
            el.style.opacity = "0";
            el.style.transform = "translateY(-8px)";
            setTimeout(function () { el.remove(); }, 280);
          }, 3200);
        }
        window.addEventListener("DOMContentLoaded", function () {
          document.body.addEventListener("toast", function (e) { showToast(e.detail); });
          document.addEventListener("keydown", function (e) {
            if (e.key === "Escape") {
              var el = document.getElementById("job-detail");
              if (el) el.innerHTML = "";
            }
          });
        });

      })();

      window.toggleTheme = function () {
        var html = document.documentElement;
        var isDark = html.classList.toggle('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
      };
    </script>
  </head>
  <body class="min-h-screen bg-cream dark:bg-dk-bg text-charcoal dark:text-dk-text antialiased transition-colors duration-300">
    <div id="toast-root"></div>
    {% block content %}{% endblock %}
  </body>
</html>
