{% extends "base.html" %}

{% block content %}
  <!-- Top Navigation -->
  <header class="sticky top-0 z-30 border-b border-warmLine/70 bg-paper/80 backdrop-blur-xl shadow-elev-1">
    <div class="absolute inset-x-0 top-0 h-full bg-hero-radial pointer-events-none"></div>
    <div class="relative mx-auto flex max-w-[1600px] items-center justify-between gap-6 px-6 py-4">
      <!-- Logo -->
      <div class="flex items-center gap-3">
        <span class="relative flex h-10 w-10 items-center justify-center rounded-xl bg-gold-metallic bg-[length:200%_100%] animate-shimmer shadow-glow ring-1 ring-goldSoft/60">
          <svg class="h-5 w-5 text-white drop-shadow" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
          </svg>
        </span>
        <div class="leading-tight">
          <h1 style="font-family:Fraunces,serif" class="text-xl font-bold tracking-tight text-charcoal">Job Scout</h1>
          <p class="text-[10px] font-semibold uppercase tracking-[0.2em] text-goldDark">Careers Intelligence</p>
        </div>
      </div>

      <!-- Reset button -->
      <div class="flex items-center gap-2">
        <button type="button"
                hx-post="{% url 'reset_jobs' %}"
                hx-target="#dashboard-content"
                hx-swap="innerHTML"
                hx-confirm="Reset all scraped jobs and scrape logs? Your companies list will be kept intact."
                class="inline-flex items-center gap-2 rounded-xl border border-warmLine/80 bg-paper px-4 py-2 text-xs font-bold text-charcoal shadow-elev-1 transition hover:border-danger/50 hover:text-danger hover:-translate-y-0.5 active:translate-y-0">
          <svg class="h-3.5 w-3.5 htmx-indicator-hide" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9M20 20v-5h-.581m0 0a8.003 8.003 0 01-15.357-2"/>
          </svg>
          <span class="htmx-indicator-hide">Reset jobs</span>
          <span class="htmx-indicator h-3.5 w-3.5 rounded-full border-2 border-current border-t-transparent animate-spin-slow"></span>
        </button>
      </div>
    </div>
  </header>

  <main class="relative mx-auto flex w-full max-w-[1600px] flex-col px-4 py-6 sm:px-6">
    <section id="dashboard-content" class="w-full animate-fade-in">
      {% include "dashboard/partials/dashboard_content.html" %}
    </section>
  </main>
{% endblock %}
