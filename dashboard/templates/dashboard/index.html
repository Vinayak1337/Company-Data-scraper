{% extends "base.html" %}

{% block content %}
  <main class="mx-auto flex min-h-screen w-full max-w-[1600px] flex-col gap-4 px-4 py-5 sm:px-6">
    <header class="flex flex-col gap-4 border-b border-white/10 pb-4 lg:flex-row lg:items-end lg:justify-between">
      <div>
        <p class="text-xs font-semibold uppercase tracking-[0.18em] text-success">Self-hosted job scraper</p>
        <h1 class="mt-1 text-3xl font-semibold tracking-normal text-white sm:text-4xl">Job Scout</h1>
        <p class="mt-2 max-w-2xl text-sm text-slate-400">Scrape company career pages, keep India as the default market, and filter the roles locally.</p>
      </div>
      <div class="grid grid-cols-2 gap-2 sm:grid-cols-4 lg:min-w-[520px]">
        {% include "dashboard/partials/stats.html" %}
      </div>
    </header>

    <section id="dashboard-content">
      {% include "dashboard/partials/dashboard_content.html" %}
    </section>
  </main>
{% endblock %}
