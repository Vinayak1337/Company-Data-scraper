{% extends "base.html" %}

{% block content %}
  <main class="mx-auto flex min-h-screen w-full max-w-[1680px] flex-col gap-6 px-4 py-6 sm:px-6 lg:px-8">
    <header class="flex flex-col gap-5 lg:flex-row lg:items-end lg:justify-between">
      <div>
        <p class="text-sm font-medium uppercase tracking-[0.22em] text-success">Self-hosted job scraper</p>
        <h1 class="mt-2 text-4xl font-semibold tracking-normal text-white sm:text-5xl">Job Scout</h1>
        <p class="mt-3 max-w-2xl text-base text-slate-400">Paste a careers or ATS URL, scrape openings, and filter your job feed without external APIs.</p>
      </div>
      <div class="grid grid-cols-2 gap-3 sm:grid-cols-4 lg:min-w-[560px]">
        {% include "dashboard/partials/stats.html" %}
      </div>
    </header>

    <section id="dashboard-content">
      {% include "dashboard/partials/dashboard_content.html" %}
    </section>
  </main>
{% endblock %}
