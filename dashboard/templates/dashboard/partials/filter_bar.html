<form class="rounded-lg border border-warmLine bg-paper p-4 shadow-soft"
      hx-get="{% url 'jobs_partial' %}"
      hx-target="#jobs-table"
      hx-trigger="input changed delay:250ms, change, submit">
  <div class="flex items-center justify-between gap-3 border-b border-warmLine pb-3">
    <div>
      <h2 class="text-base font-semibold text-charcoal">Filters</h2>
      <p class="mt-0.5 text-xs text-muted">India by default</p>
    </div>
    <a href="{% url 'dashboard' %}" class="rounded-md border border-warmLine px-2.5 py-1.5 text-xs font-semibold text-muted transition hover:border-gold hover:text-charcoal">Reset</a>
  </div>

  <div class="mt-4 space-y-3">
    <label class="block">
      <span class="mb-1 block text-xs font-semibold uppercase tracking-wide text-muted">Search</span>
      <input name="q" value="{{ filters.q }}" class="h-10 w-full rounded-md border border-warmLine bg-paper px-3 text-sm text-charcoal outline-none placeholder:text-muted/70 focus:border-gold focus:ring-2 focus:ring-gold/25" placeholder="Role, company, keyword">
    </label>

    <label class="block">
      <span class="mb-1 block text-xs font-semibold uppercase tracking-wide text-muted">Title</span>
      <input name="title" value="{{ filters.title }}" class="h-10 w-full rounded-md border border-warmLine bg-paper px-3 text-sm text-charcoal outline-none placeholder:text-muted/70 focus:border-gold focus:ring-2 focus:ring-gold/25" placeholder="Backend, data, intern">
    </label>

    <label class="block">
      <span class="mb-1 block text-xs font-semibold uppercase tracking-wide text-muted">Company</span>
      <select name="company" class="h-10 w-full rounded-md border border-warmLine bg-paper px-3 text-sm text-charcoal outline-none focus:border-gold focus:ring-2 focus:ring-gold/25">
        <option value="">All companies</option>
        {% for company in companies %}
          <option value="{{ company.id }}" {% if filters.company == company.id|stringformat:"s" %}selected{% endif %}>{{ company.name }}</option>
        {% endfor %}
      </select>
    </label>

    <div class="grid grid-cols-2 gap-3">
      <label>
        <span class="mb-1 block text-xs font-semibold uppercase tracking-wide text-muted">Scope</span>
        <select name="country" class="h-10 w-full rounded-md border border-warmLine bg-paper px-3 text-sm text-charcoal outline-none focus:border-gold focus:ring-2 focus:ring-gold/25">
          <option value="India" {% if filters.country == "India" %}selected{% endif %}>India</option>
          <option value="global" {% if filters.country == "global" %}selected{% endif %}>Global</option>
        </select>
      </label>
      <label>
        <span class="mb-1 block text-xs font-semibold uppercase tracking-wide text-muted">Mode</span>
        <select name="remote" class="h-10 w-full rounded-md border border-warmLine bg-paper px-3 text-sm text-charcoal outline-none focus:border-gold focus:ring-2 focus:ring-gold/25">
          <option value="">Any</option>
          <option value="remote" {% if filters.remote == "remote" %}selected{% endif %}>Remote</option>
          <option value="hybrid" {% if filters.remote == "hybrid" %}selected{% endif %}>Hybrid</option>
          <option value="onsite" {% if filters.remote == "onsite" %}selected{% endif %}>Onsite</option>
        </select>
      </label>
    </div>

    <label class="block">
      <span class="mb-1 block text-xs font-semibold uppercase tracking-wide text-muted">State / region</span>
      <select name="state" class="h-10 w-full rounded-md border border-warmLine bg-paper px-3 text-sm text-charcoal outline-none focus:border-gold focus:ring-2 focus:ring-gold/25">
        {% for value,label in india_states %}
          <option value="{{ value }}" {% if filters.state == value %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </label>

    <label class="block">
      <span class="mb-1 block text-xs font-semibold uppercase tracking-wide text-muted">City</span>
      <select name="city" class="h-10 w-full rounded-md border border-warmLine bg-paper px-3 text-sm text-charcoal outline-none focus:border-gold focus:ring-2 focus:ring-gold/25">
        {% for value,label in india_cities %}
          <option value="{{ value }}" {% if filters.city == value %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </label>

    <label class="block">
      <span class="mb-1 block text-xs font-semibold uppercase tracking-wide text-muted">Location text</span>
      <input name="location" value="{{ filters.location }}" class="h-10 w-full rounded-md border border-warmLine bg-paper px-3 text-sm text-charcoal outline-none placeholder:text-muted/70 focus:border-gold focus:ring-2 focus:ring-gold/25" placeholder="Optional exact text">
    </label>
  </div>

  <div class="mt-4 border-t border-warmLine pt-4">
    <div class="mb-2 text-xs font-semibold uppercase tracking-wide text-muted">Tech stack</div>
    <div class="flex max-h-[160px] flex-wrap gap-1.5 overflow-auto pr-1">
      <button name="tech" value="" class="rounded-full border px-2.5 py-1 text-xs font-semibold transition {% if not filters.tech %}border-gold bg-goldSoft text-charcoal{% else %}border-warmLine bg-paper text-muted hover:border-gold hover:text-charcoal{% endif %}">All</button>
      {% for tag in tags %}
        <button name="tech" value="{{ tag }}" class="rounded-full border px-2.5 py-1 text-xs font-semibold transition {% if filters.tech == tag %}border-gold bg-goldSoft text-charcoal{% else %}border-warmLine bg-paper text-muted hover:border-gold hover:text-charcoal{% endif %}">{{ tag }}</button>
      {% endfor %}
    </div>
  </div>
</form>
