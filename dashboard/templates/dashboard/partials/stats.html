<div class="rounded-md border border-warmLine dark:border-dk-border bg-cream dark:bg-dk-paper px-3 py-3">
  <div class="text-xl font-semibold text-charcoal dark:text-dk-text">{{ stats.total_jobs }}</div>
  <div class="mt-1 text-xs font-medium uppercase tracking-wide text-muted dark:text-dk-muted">Jobs</div>
</div>
<div class="rounded-md border border-warmLine dark:border-dk-border bg-cream dark:bg-dk-paper px-3 py-3">
  <div class="text-xl font-semibold text-charcoal dark:text-dk-text">{{ stats.active_companies }}</div>
  <div class="mt-1 text-xs font-medium uppercase tracking-wide text-muted dark:text-dk-muted">Companies</div>
</div>
<div class="rounded-md border border-warmLine dark:border-dk-border bg-cream dark:bg-dk-paper px-3 py-3">
  <div class="text-xl font-semibold text-charcoal dark:text-dk-text">{{ stats.jobs_today }}</div>
  <div class="mt-1 text-xs font-medium uppercase tracking-wide text-muted dark:text-dk-muted">Today</div>
</div>
<div class="rounded-md border border-warmLine dark:border-dk-border bg-cream dark:bg-dk-paper px-3 py-3">
  <div class="truncate text-sm font-semibold text-charcoal dark:text-dk-text">
    {% if stats.last_log %}{{ stats.last_log.get_status_display }}{% else %}Idle{% endif %}
  </div>
  <div class="mt-1 text-xs font-medium uppercase tracking-wide text-muted dark:text-dk-muted">Last scrape</div>
</div>
