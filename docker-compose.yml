services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-job_scout}
      POSTGRES_USER: ${POSTGRES_USER:-job_scout}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-job_scout}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - job-scout-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-job_scout} -d ${POSTGRES_DB:-job_scout}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    command: sh -c "python manage.py migrate --no-input && gunicorn jobhunt.wsgi:application --bind 0.0.0.0:$${PORT:-8000}"
    environment:
      SECRET_KEY: ${SECRET_KEY:-dev-only-change-me}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      TIME_ZONE: ${TIME_ZONE:-UTC}
      DATABASE_URL: postgresql://${POSTGRES_USER:-job_scout}:${POSTGRES_PASSWORD:-job_scout}@db:5432/${POSTGRES_DB:-job_scout}
      DATABASE_SSLMODE: disable
      JOB_SCOUT_REQUIRE_AUTH: ${JOB_SCOUT_REQUIRE_AUTH:-False}
      JOB_SCOUT_API_TOKEN: ${JOB_SCOUT_API_TOKEN:-}
      AGENT_EXECUTION_MODE: ${AGENT_EXECUTION_MODE:-queued}
      AGENT_QUEUE_BATCH_SIZE: ${AGENT_QUEUE_BATCH_SIZE:-5}
      SCRAPER_TIMEOUT_SECONDS: ${SCRAPER_TIMEOUT_SECONDS:-20}
      SCANNER_ENABLED: ${SCANNER_ENABLED:-True}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-False}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-job-scout-v3}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      DEFAULT_FROM_EMAIL: "${DEFAULT_FROM_EMAIL:-Job Scout <job-scout@example.local>}"
      EMAIL_HOST: ${EMAIL_HOST:-localhost}
      EMAIL_PORT: ${EMAIL_PORT:-25}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-False}
      EMAIL_USE_SSL: ${EMAIL_USE_SSL:-False}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  scanner:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    command: sh -c "while true; do python manage.py scan_due_companies --limit $${SCAN_BATCH_LIMIT:-25}; python manage.py send_match_notifications --limit $${NOTIFICATION_BATCH_LIMIT:-25}; sleep $${SCAN_INTERVAL_SECONDS:-3600}; done"
    environment:
      SECRET_KEY: ${SECRET_KEY:-dev-only-change-me}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      TIME_ZONE: ${TIME_ZONE:-UTC}
      DATABASE_URL: postgresql://${POSTGRES_USER:-job_scout}:${POSTGRES_PASSWORD:-job_scout}@db:5432/${POSTGRES_DB:-job_scout}
      DATABASE_SSLMODE: disable
      SCRAPER_TIMEOUT_SECONDS: ${SCRAPER_TIMEOUT_SECONDS:-20}
      SCAN_BATCH_LIMIT: ${SCAN_BATCH_LIMIT:-25}
      SCAN_INTERVAL_SECONDS: ${SCAN_INTERVAL_SECONDS:-3600}
      NOTIFICATION_BATCH_LIMIT: ${NOTIFICATION_BATCH_LIMIT:-25}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      DEFAULT_FROM_EMAIL: "${DEFAULT_FROM_EMAIL:-Job Scout <job-scout@example.local>}"
      EMAIL_HOST: ${EMAIL_HOST:-localhost}
      EMAIL_PORT: ${EMAIL_PORT:-25}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-False}
      EMAIL_USE_SSL: ${EMAIL_USE_SSL:-False}
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy

  agent-worker:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    command: sh -c "while true; do python manage.py process_agent_queue --limit $${AGENT_QUEUE_BATCH_SIZE:-5}; sleep $${AGENT_WORKER_POLL_SECONDS:-30}; done"
    environment:
      SECRET_KEY: ${SECRET_KEY:-dev-only-change-me}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      TIME_ZONE: ${TIME_ZONE:-UTC}
      DATABASE_URL: postgresql://${POSTGRES_USER:-job_scout}:${POSTGRES_PASSWORD:-job_scout}@db:5432/${POSTGRES_DB:-job_scout}
      DATABASE_SSLMODE: disable
      AGENT_EXECUTION_MODE: ${AGENT_EXECUTION_MODE:-queued}
      AGENT_QUEUE_BATCH_SIZE: ${AGENT_QUEUE_BATCH_SIZE:-5}
      AGENT_WORKER_POLL_SECONDS: ${AGENT_WORKER_POLL_SECONDS:-30}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-False}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-job-scout-v3}
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy

volumes:
  job-scout-postgres:
