services:
  - type: web
    name: job-scout-backend
    runtime: python
    rootDir: Backend
    plan: free
    buildCommand: ./build.sh
    preDeployCommand: python manage.py migrate --no-input && python manage.py check --deploy
    startCommand: gunicorn jobhunt.wsgi:application
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://*.onrender.com
      - key: TIME_ZONE
        value: UTC
      - key: SCRAPER_TIMEOUT_SECONDS
        value: 20
      - key: JOB_SCOUT_REQUIRE_AUTH
        value: true
      - key: JOB_SCOUT_API_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: job-scout-db
          property: connectionString
      - key: DATABASE_SSLMODE
        value: require
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: LANGSMITH_TRACING
        value: false
      - key: LANGSMITH_API_KEY
        sync: false
      - key: LANGSMITH_PROJECT
        value: job-scout-v2
      - key: MTEANE_ENABLED
        value: false
      - key: MTEANE_API_URL
        sync: false
      - key: MTEANE_API_KEY
        sync: false
      - key: MTEANE_TIMEOUT_SECONDS
        value: 3

  - type: web
    name: job-scout-frontend
    runtime: node
    rootDir: Frontend
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
      - key: NEXT_TELEMETRY_DISABLED
        value: 1
      - key: BACKEND_API_BASE_URL
        value: https://job-scout-backend.onrender.com/api
      - key: BACKEND_API_TOKEN
        sync: false

databases:
  - name: job-scout-db
    plan: free
    databaseName: job_scout
    user: job_scout
