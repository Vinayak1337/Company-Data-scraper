{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Job Scout</title>
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
    <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
    <script>
      document.addEventListener("htmx:configRequest", function (event) {
        const token = document.cookie.split("; ").find((row) => row.startsWith("csrftoken="));
        if (token) {
          event.detail.headers["X-CSRFToken"] = decodeURIComponent(token.split("=")[1]);
        }
      });
    </script>
  </head>
  <body class="min-h-screen bg-cream text-charcoal antialiased">
    {% block content %}{% endblock %}
  </body>
</html>
